name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup EAS
        uses: expo/eas-build@main
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Build release APK
        run: eas build --platform android --profile release --local --output ./task-journal.apk --no-wait

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Read release notes
        id: notes
        run: |
          FILE="docs/release-notes/v${{ steps.version.outputs.VERSION }}.md"
          if [ -f "$FILE" ]; then
            echo "Found release notes: $FILE"
            {
              echo "BODY<<EOF"
              cat "$FILE"
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No release notes found at $FILE"
            echo "BODY=No release notes available." >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK
        run: mv task-journal.apk task-journal-${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Task Journal v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.notes.outputs.BODY }}
          files: task-journal-${{ steps.version.outputs.VERSION }}.apk

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/sync-engine
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: sync-engine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
